name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install
        run: uv sync --python ${{ matrix.python-version }} --extra server
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
