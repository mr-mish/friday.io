<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FRIDAY</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #101722; --line: #1d2a3a;
    --text: #d7e2ee; --dim: #6b7f95; --accent: #35c7e8; --warn: #e8b135;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column;
    font: 15px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
  }
  .pulse.offline { background: #d9534f; box-shadow: 0 0 8px #d9534f; }
  header h1 { font-size: 15px; letter-spacing: .35em; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12px; margin-left: auto; }
  header button {
    background: none; border: 1px solid var(--line); color: var(--dim);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  header button:hover { color: var(--text); border-color: var(--accent); }

  #chat { flex: 1; overflow-y: auto; padding: 20px clamp(16px, 8vw, 120px); }
  .msg { margin: 10px 0; max-width: 72ch; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user {
    margin-left: auto; background: #16344a; border: 1px solid #1e4a68;
    padding: 8px 14px; border-radius: 14px 14px 4px 14px;
  }
  .msg.friday { color: var(--text); }
  .tool {
    color: var(--dim); font: 12px/1.6 ui-monospace, monospace; padding-left: 10px;
    border-left: 2px solid var(--line); margin: 4px 0;
  }
  .cost { color: var(--dim); font-size: 11px; margin: 2px 0 14px; }
  .thinking { color: var(--dim); animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .35; } }

  form {
    display: flex; gap: 10px; padding: 14px 18px;
    border-top: 1px solid var(--line); background: var(--panel);
  }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px;
    font: inherit; outline: none; height: 46px;
  }
  textarea:focus { border-color: var(--accent); }
  form button {
    background: var(--accent); color: #04222c; border: 0; border-radius: 10px;
    padding: 0 22px; font-weight: 700; cursor: pointer;
  }
  form button:disabled { opacity: .4; cursor: default; }

  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--warn);
    border-radius: 12px; padding: 22px; max-width: 480px; width: 90%;
  }
  dialog::backdrop { background: rgba(4, 8, 12, .75); }
  dialog h2 { font-size: 14px; color: var(--warn); margin-bottom: 10px; }
  dialog .detail {
    font: 13px ui-monospace, monospace; background: var(--bg); border-radius: 8px;
    padding: 10px; margin: 10px 0; overflow-x: auto;
  }
  dialog .reason { color: var(--dim); font-size: 13px; }
  dialog menu { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding: 0; }
  dialog button { border-radius: 8px; padding: 8px 18px; cursor: pointer; border: 1px solid var(--line); }
  #deny { background: none; color: var(--text); }
  #allow { background: var(--warn); border-color: var(--warn); color: #241a04; font-weight: 700; }

  aside {
    position: fixed; right: 0; top: 0; bottom: 0; width: min(340px, 90vw);
    background: var(--panel); border-left: 1px solid var(--line); padding: 18px;
    transform: translateX(100%); transition: transform .2s; overflow-y: auto;
  }
  aside.open { transform: none; }
  aside h2 { font-size: 13px; letter-spacing: .2em; color: var(--dim); margin-bottom: 12px; }
  aside li { list-style: none; border-bottom: 1px solid var(--line); padding: 8px 0; font-size: 13px; }
  aside li time { color: var(--dim); font-size: 11px; display: block; }
</style>
</head>
<body>
  <header>
    <div class="pulse offline" id="pulse"></div>
    <h1>FRIDAY</h1>
    <span class="sub" id="sub">connecting…</span>
    <button id="memBtn" type="button">memories</button>
  </header>

  <main id="chat"></main>

  <form id="composer">
    <textarea id="input" placeholder="Talk to FRIDAY…" autofocus></textarea>
    <button id="send" type="submit" disabled>Send</button>
  </form>

  <dialog id="confirm">
    <h2>⚠ Permission required</h2>
    <div id="confTool"></div>
    <div class="detail" id="confDetail"></div>
    <div class="reason" id="confReason"></div>
    <menu>
      <button id="deny" type="button">Deny</button>
      <button id="allow" type="button">Allow</button>
    </menu>
  </dialog>

  <aside id="memories"><h2>MEMORIES</h2><ul id="memList"></ul></aside>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const send = document.getElementById("send");
  const pulse = document.getElementById("pulse");
  const sub = document.getElementById("sub");
  const confirmDlg = document.getElementById("confirm");

  let ws = null, fridayEl = null, thinkingEl = null, confirmId = null;

  function el(cls, text) {
    const node = document.createElement("div");
    node.className = cls;
    if (text !== undefined) node.textContent = text;
    chat.appendChild(node);
    chat.scrollTop = chat.scrollHeight;
    return node;
  }

  function setBusy(busy) {
    send.disabled = busy || !ws || ws.readyState !== 1;
    if (busy && !thinkingEl) thinkingEl = el("thinking", "▍");
    if (!busy && thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { pulse.classList.remove("offline"); sub.textContent = "online"; setBusy(false); };
    ws.onclose = () => {
      pulse.classList.add("offline"); sub.textContent = "reconnecting…";
      send.disabled = true; setTimeout(connect, 1500);
    };
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "text") {
        if (!fridayEl) fridayEl = el("msg friday", "");
        fridayEl.textContent += (fridayEl.textContent ? "\n" : "") + msg.text;
        chat.scrollTop = chat.scrollHeight;
      } else if (msg.type === "tool") {
        el("tool", "· " + msg.label);
      } else if (msg.type === "done") {
        if (msg.cost) el("cost", msg.cost);
        fridayEl = null; setBusy(false);
      } else if (msg.type === "confirm") {
        confirmId = msg.id;
        document.getElementById("confTool").textContent = msg.tool;
        document.getElementById("confDetail").textContent = msg.detail || "(no detail)";
        document.getElementById("confReason").textContent = msg.reason;
        confirmDlg.showModal();
      } else if (msg.type === "notice") {
        el("tool", "🔔 " + msg.message);
      } else if (msg.type === "error") {
        el("msg friday", "⚠ " + msg.message); fridayEl = null; setBusy(false);
      }
    };
  }

  function respond(approved) {
    if (confirmId && ws) ws.send(JSON.stringify({ type: "confirm_response", id: confirmId, approved }));
    confirmId = null; confirmDlg.close();
  }
  document.getElementById("allow").onclick = () => respond(true);
  document.getElementById("deny").onclick = () => respond(false);
  confirmDlg.addEventListener("cancel", () => respond(false)); // Esc = deny

  document.getElementById("composer").onsubmit = (event) => {
    event.preventDefault();
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    el("msg user", text);
    ws.send(JSON.stringify({ type: "user", text }));
    input.value = ""; fridayEl = null; setBusy(true);
  };
  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      document.getElementById("composer").requestSubmit();
    }
  });

  document.getElementById("memBtn").onclick = async () => {
    const panel = document.getElementById("memories");
    if (!panel.classList.toggle("open")) return;
    const items = await (await fetch("/api/memories")).json();
    document.getElementById("memList").innerHTML = items.length
      ? items.map(m => `<li>${m.fact.replace(/</g, "&lt;")}<time>${m.created.slice(0, 10)}</time></li>`).join("")
      : "<li>Nothing remembered yet.</li>";
  };

  fetch("/api/status").then(r => r.json()).then(s => {
    sub.textContent = `v${s.version} · ${s.granted_roots.length} granted folder(s)`;
  });
  connect();
</script>
</body>
</html>
